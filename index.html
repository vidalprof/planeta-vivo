<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>Planeta Vivo — Climas do Mundo (6º ano)</title>
<meta name="theme-color" content="#0c1638">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planeta Vivo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* ===== Planeta Vivo (fatia de teste, motion comic + PWA) =====
   Compat: sem grid/gap/var(--)/clamp; anima só transform/opacity; pares -webkit-. */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;height:100vh;height:100dvh;width:100%;overflow:hidden;position:fixed;top:0;left:0;
  background:#241a52;background:-webkit-linear-gradient(top,#181a44,#3a2b63);background:linear-gradient(to bottom,#181a44,#3a2b63);
  font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Segoe UI Variable","Segoe UI",system-ui,Arial,sans-serif;color:#fff;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
/* PALCO que se encaixa sozinho: canvas fixo 400x780 escalado p/ caber em QUALQUER tela (nunca corta). */
#stage{position:absolute;top:50%;left:50%;width:400px;height:780px;
  -webkit-transform-origin:50% 50%;transform-origin:50% 50%;
  -webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%)}
#app{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;border-radius:2px}
/* FUNDO edge-to-edge: o espaço cobre a TELA INTEIRA (mata o letterbox vazio) */
#fundo{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;overflow:hidden;
  background:#080b22;background:-webkit-radial-gradient(50% 20%,#242b60,#0b0e2c 60%,#070917);background:radial-gradient(ellipse at 50% 20%,#242b60,#0b0e2c 60%,#070917)}
#fundo .neb{position:absolute;top:-5%;left:-5%;right:-5%;bottom:-5%;background:center/cover no-repeat url('img/ceu_noite.jpg');opacity:.42;
  -webkit-animation:derivaCeu 80s ease-in-out infinite alternate;animation:derivaCeu 80s ease-in-out infinite alternate}
.tela .ceu{display:none}
.mapa.constel{background:transparent}
.tela{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;opacity:1;
  -webkit-animation:telaIn .45s cubic-bezier(.2,.7,.3,1) both;animation:telaIn .45s cubic-bezier(.2,.7,.3,1) both}
@-webkit-keyframes telaIn{from{opacity:0;-webkit-transform:translateY(14px) scale(.985)}to{opacity:1;-webkit-transform:none}}
@keyframes telaIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
/* HIT-STOP (~70ms de pausa no impacto = peso) e TREMIDA com micro-rotação (game feel) */
#app.hitstop *{-webkit-animation-play-state:paused!important;animation-play-state:paused!important}
#app.tremida{-webkit-animation:tremida .32s ease;animation:tremida .32s ease}
@-webkit-keyframes tremida{0%,100%{-webkit-transform:none}25%{-webkit-transform:translate(2px,-1px) rotate(.25deg)}50%{-webkit-transform:translate(-2px,1px) rotate(-.2deg)}75%{-webkit-transform:translate(1px,1px) rotate(.15deg)}}
@keyframes tremida{0%,100%{transform:none}25%{transform:translate(2px,-1px) rotate(.25deg)}50%{transform:translate(-2px,1px) rotate(-.2deg)}75%{transform:translate(1px,1px) rotate(.15deg)}}
img{-webkit-user-drag:none;user-drag:none}

/* céu de fundo (parallax) */
.ceu{position:absolute;top:-5%;left:-5%;width:110%;height:110%;
  background:#12163a center/cover no-repeat;background-image:url('img/ceu_noite.jpg');
  -webkit-animation:derivaCeu 70s ease-in-out infinite alternate;animation:derivaCeu 70s ease-in-out infinite alternate}
@-webkit-keyframes derivaCeu{from{-webkit-transform:translate3d(0,0,0) scale(1.03)}to{-webkit-transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}
@keyframes derivaCeu{from{transform:translate3d(0,0,0) scale(1.03)}to{transform:translate3d(-2.5%,-1.5%,0) scale(1.07)}}

/* estrelinhas piscando */
.estrelas{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.pt{position:absolute;border-radius:50%;background:#fff;opacity:.2;box-shadow:0 0 5px 1px rgba(255,255,255,.55);
  -webkit-animation:cintila 4.5s ease-in-out infinite;animation:cintila 4.5s ease-in-out infinite}
@-webkit-keyframes cintila{0%,100%{opacity:.09;-webkit-transform:scale(.6)}50%{opacity:.75;-webkit-transform:scale(1.1)}}
@keyframes cintila{0%,100%{opacity:.09;transform:scale(.6)}50%{opacity:.75;transform:scale(1.1)}}

/* ---- FÁBRICA VIVA (glow + fumaças de estrela) ---- */
.fabviva{position:absolute}
.fabviva .fab{width:100%;height:auto;display:block;position:relative;z-index:1;
  -webkit-filter:drop-shadow(0 6px 16px rgba(0,0,0,.35));filter:drop-shadow(0 6px 16px rgba(0,0,0,.35))}
.fabviva .glow{position:absolute;left:-16%;top:-16%;width:132%;height:132%;border-radius:50%;z-index:0;
  background:radial-gradient(circle, rgba(255,205,110,.42), rgba(255,205,110,0) 62%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes pulsaGlow{0%,100%{opacity:.45;-webkit-transform:scale(1)}50%{opacity:.85;-webkit-transform:scale(1.07)}}
@keyframes pulsaGlow{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
.puff{position:absolute;width:15%;height:13%;border-radius:50%;z-index:2;opacity:0;
  background:radial-gradient(circle, rgba(255,244,205,.95), rgba(255,224,150,0) 70%);
  -webkit-animation:sobePuff 3s ease-out infinite;animation:sobePuff 3s ease-out infinite}
@-webkit-keyframes sobePuff{0%{opacity:0;-webkit-transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;-webkit-transform:translateY(-115%) scale(1.5)}}
@keyframes sobePuff{0%{opacity:0;transform:translateY(6%) scale(.4)}18%{opacity:.9}100%{opacity:0;transform:translateY(-115%) scale(1.5)}}

/* ---- FAGULHA VIVA (balança + flutua + respira + reaçõezinhas) ---- */
.fag{position:absolute;width:185px}
.fagbob{-webkit-animation:bobSway 4.7s ease-in-out infinite;animation:bobSway 4.7s ease-in-out infinite}
@-webkit-keyframes bobSway{0%,100%{-webkit-transform:translateY(0) rotate(-1.6deg)}50%{-webkit-transform:translateY(-7px) rotate(1.6deg)}}
@keyframes bobSway{0%,100%{transform:translateY(0) rotate(-1.6deg)}50%{transform:translateY(-7px) rotate(1.6deg)}}
.fagwrap{-webkit-transform-origin:50% 100%;transform-origin:50% 100%;
  -webkit-animation:respira 4.2s ease-in-out infinite;animation:respira 4.2s ease-in-out infinite}
@-webkit-keyframes respira{0%,100%{-webkit-transform:translateY(0) scale(1,1)}50%{-webkit-transform:translateY(-1.4%) scale(1.018,.982)}}
@keyframes respira{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-1.4%) scale(1.018,.982)}}
.corpo-fag{position:relative;width:100%}
.corpo-fag .lay{position:absolute;top:0;left:0;width:100%;height:auto;display:block}
.corpo-fag .base{position:relative}
.corpo-fag .fala,.corpo-fag .pisca{opacity:0}
/* camada de POSE (crossfade suave entre poses, em vez de troca seca de imagem) */
.corpo-fag .pose{opacity:0;-webkit-transition:opacity .16s ease;transition:opacity .16s ease}
/* sombra no chão: gruda a Nara no cenário (respira no mesmo ritmo do bob) */
.fagsombra{position:absolute;left:18%;bottom:-3%;width:64%;height:9%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(0,0,20,.42), rgba(0,0,20,0) 70%);
  -webkit-animation:sombraResp 4.7s ease-in-out infinite;animation:sombraResp 4.7s ease-in-out infinite}
@-webkit-keyframes sombraResp{0%,100%{-webkit-transform:scale(1);opacity:.8}50%{-webkit-transform:scale(.86);opacity:.55}}
@keyframes sombraResp{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(.86);opacity:.55}}
.fag.fidget .corpo-fag{-webkit-animation:fidget .6s ease;animation:fidget .6s ease}
/* FALANDO: o corpo acompanha a VOZ de verdade — o baloiço é dirigido pela amplitude da boca
   no loop rAF (ver loop()): amplitude alta = gesto maior; silêncio = corpo assenta sozinho. */
@-webkit-keyframes fidget{0%{-webkit-transform:scale(1) rotate(0)}30%{-webkit-transform:scale(1.06) rotate(4deg)}60%{-webkit-transform:scale(1.01) rotate(-3deg)}100%{-webkit-transform:scale(1) rotate(0)}}
@keyframes fidget{0%{transform:scale(1) rotate(0)}30%{transform:scale(1.06) rotate(4deg)}60%{transform:scale(1.01) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}

/* ---------- CAPA (medalhão) ---------- */
.capa .centro{position:absolute;top:0;left:0;right:0;bottom:0;
  display:-webkit-box;display:-webkit-flex;display:flex;
  -webkit-box-orient:vertical;-webkit-box-pack:center;-webkit-box-align:center;
  -webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
  text-align:center;padding:0 14px}
.capa .centro>*{max-width:100%}
.medalhao{width:250px;height:250px;margin:0 auto;border-radius:50%;
  overflow:hidden;border:7px solid #ffd75e;position:relative;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 22px rgba(0,0,0,.35);
  -webkit-animation:flutua 4.5s ease-in-out infinite;animation:flutua 4.5s ease-in-out infinite}
.medalhao .mceu{position:absolute;top:-10%;left:-10%;width:120%;height:120%;
  background:#0a1330;background:-webkit-radial-gradient(30% 26%, circle, #1b2b63 0%, #0c1638 55%, #060b22 100%);
  background:radial-gradient(circle at 30% 26%, #1b2b63 0%, #0c1638 55%, #060b22 100%)}
.medalhao .mfab{position:absolute;bottom:2%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);width:66%}
.medalhao .mglow{position:absolute;left:20%;top:22%;width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle, rgba(255,205,110,.5), rgba(255,205,110,0) 60%);
  -webkit-animation:pulsaGlow 3.6s ease-in-out infinite;animation:pulsaGlow 3.6s ease-in-out infinite}
@-webkit-keyframes flutua{0%,100%{-webkit-transform:translateY(0)}50%{-webkit-transform:translateY(-9px)}}
@keyframes flutua{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
/* CAPA — a Terra GIRA (2 cópias deslizando por transform = giro contínuo sem costura; o círculo mascara) */
.planeta{width:240px;height:240px;margin:0 auto;border-radius:50%;overflow:hidden;position:relative;
  -webkit-box-shadow:0 0 42px rgba(95,155,255,.5),0 14px 34px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.45);
  box-shadow:0 0 42px rgba(95,155,255,.5),0 14px 34px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.45);
  -webkit-animation:flutua 4.5s ease-in-out infinite;animation:flutua 4.5s ease-in-out infinite}
.terrastrip{position:absolute;top:0;left:0;height:100%;white-space:nowrap;
  -webkit-animation:giraterra 44s linear infinite;animation:giraterra 44s linear infinite}
.terrastrip img{height:100%;width:auto;display:inline-block;vertical-align:top}
@-webkit-keyframes giraterra{from{-webkit-transform:translateX(0)}to{-webkit-transform:translateX(-50%)}}
@keyframes giraterra{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.terrashade{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;pointer-events:none;
  background:-webkit-radial-gradient(34% 30%, rgba(255,255,255,.34), rgba(255,255,255,0) 44%);
  background:radial-gradient(circle at 34% 30%, rgba(255,255,255,.34), rgba(255,255,255,0) 44%),radial-gradient(circle at 70% 76%, rgba(0,8,34,.62), rgba(0,8,34,0) 62%)}
.atmo{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;pointer-events:none;
  -webkit-box-shadow:inset 0 0 20px rgba(130,190,255,.65);box-shadow:inset 0 0 20px rgba(130,190,255,.65);
  -webkit-animation:pulsaGlow 3.8s ease-in-out infinite;animation:pulsaGlow 3.8s ease-in-out infinite}
h1.titulo{font-size:27px;line-height:1.12;margin:14px 8px 2px;color:#ffe08a;text-shadow:0 2px 0 #7a5200,0 0 18px rgba(255,200,80,.5)}
.sub{font-size:14px;color:#cdd3ff;margin-bottom:14px}
.btn{display:inline-block;border:0;cursor:pointer;font-family:inherit;font-weight:800;color:#5a3b00;max-width:94%;
  background:-webkit-linear-gradient(top,#ffe27a,#ffc23c);background:linear-gradient(to bottom,#ffe27a,#ffc23c);
  padding:14px 26px;font-size:18px;border-radius:30px;box-shadow:0 5px 0 #c8871a,0 8px 18px rgba(0,0,0,.4)}
.btn:active{-webkit-transform:translateY(3px);transform:translateY(3px);box-shadow:0 2px 0 #c8871a}
.pulsa{-webkit-animation:pulsa 1.3s ease-in-out infinite;animation:pulsa 1.3s ease-in-out infinite}
@-webkit-keyframes pulsa{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.05)}}
@keyframes pulsa{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.capa .fagacena{position:absolute;bottom:6px;right:4px;width:106px}
.capa .fagacena img{width:100%;height:auto;display:block}

/* ---------- ABERTURA ---------- */
.palco{position:absolute;top:0;left:0;right:0;bottom:0;
  -webkit-animation:pushin 15s ease-out both;animation:pushin 15s ease-out both}
@-webkit-keyframes pushin{from{-webkit-transform:scale(1)}to{-webkit-transform:scale(1.1)}}
@keyframes pushin{from{transform:scale(1)}to{transform:scale(1.1)}}
.abertura .fabviva{left:50%;bottom:22%;width:320px;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  -webkit-animation:sobeFab 1.2s ease-out both;animation:sobeFab 1.2s ease-out both}
@-webkit-keyframes sobeFab{from{opacity:0;-webkit-transform:translate(-50%,26px) scale(.9)}to{opacity:1;-webkit-transform:translate(-50%,0) scale(1)}}
@keyframes sobeFab{from{opacity:0;transform:translate(-50%,26px) scale(.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
.abertura .fag{left:6%;bottom:7%;-webkit-animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both;animation:entraFag .8s .4s cubic-bezier(.2,.7,.2,1) both}
@-webkit-keyframes entraFag{0%{opacity:0;-webkit-transform:translateX(-46px)}70%{opacity:1;-webkit-transform:translateX(6px)}100%{opacity:1;-webkit-transform:translateX(0)}}
@keyframes entraFag{0%{opacity:0;transform:translateX(-46px)}70%{opacity:1;transform:translateX(6px)}100%{opacity:1;transform:translateX(0)}}
.legenda{position:absolute;left:50%;bottom:5%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  width:92%;max-width:640px;text-align:center;font-size:18px;line-height:1.4;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.95);min-height:3.2em}
.pular{position:absolute;top:12px;right:12px;font-size:13px;color:#dfe3ff;background:rgba(0,0,0,.4);border:0;border-radius:16px;padding:8px 15px;cursor:pointer}

/* ---------- MAPA ---------- */
.mapa .topo{position:absolute;top:0;left:0;right:0;padding:12px 14px;text-align:center;z-index:5;
  background:-webkit-linear-gradient(top,rgba(6,8,30,.82),rgba(6,8,30,0));background:linear-gradient(to bottom,rgba(6,8,30,.82),rgba(6,8,30,0))}
.mapa .topo b{color:#ffe08a;font-size:16px}
.no{position:absolute;width:84px}
.no img{width:100%;height:auto;display:block;-webkit-filter:drop-shadow(0 0 10px rgba(255,220,120,.7));filter:drop-shadow(0 0 10px rgba(255,220,120,.7))}
.no.futuro img{-webkit-filter:grayscale(1) brightness(.5);filter:grayscale(1) brightness(.5);opacity:.6}
.no.atual{-webkit-animation:farol 1.2s ease-in-out infinite;animation:farol 1.2s ease-in-out infinite}
@-webkit-keyframes farol{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.13)}}
@keyframes farol{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
.mapa .fag{right:5%;bottom:8%}
.dica{position:absolute;left:50%;bottom:3%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  font-size:15px;font-style:italic;color:#ffe9a8;text-shadow:0 0 10px rgba(255,200,80,.5);text-align:center;width:90%;
  -webkit-animation:respiraDica 2.6s ease-in-out infinite;animation:respiraDica 2.6s ease-in-out infinite}
@-webkit-keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes respiraDica{0%,100%{opacity:.55}50%{opacity:1}}
.mapa .fabviva.destino{position:absolute;left:50%;top:6%;width:130px;z-index:3;
  -webkit-transform:translateX(-50%);transform:translateX(-50%)}
.mapa .trilhaScroll{position:absolute;top:0;left:0;width:100%;z-index:1;
  -webkit-transition:-webkit-transform 1.1s ease;transition:transform 1.1s ease}
.mapa .trilha{position:absolute;top:0;left:0;width:100%;z-index:2;pointer-events:none}
/* tracejadinho de pontos (trilha das fases futuras): brilho SUAVE que pulsa devagar */
.trilhaPontos{-webkit-filter:drop-shadow(0 0 3px rgba(190,205,255,.85));filter:drop-shadow(0 0 3px rgba(190,205,255,.85));
  -webkit-animation:pontosBrilho 3.4s ease-in-out infinite;animation:pontosBrilho 3.4s ease-in-out infinite}
@-webkit-keyframes pontosBrilho{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes pontosBrilho{0%,100%{opacity:.5}50%{opacity:1}}
.mapa .nowrap{position:absolute;z-index:4;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%)}
.mapa .no{position:relative;width:72px}
.mapa .no.feito img{-webkit-filter:drop-shadow(0 0 12px rgba(255,220,120,.95));filter:drop-shadow(0 0 12px rgba(255,220,120,.95))}
.mapa .nowrap.alivio .no:not(.futuro) img{-webkit-filter:hue-rotate(175deg) drop-shadow(0 0 10px rgba(120,200,255,.8));filter:hue-rotate(175deg) drop-shadow(0 0 10px rgba(120,200,255,.8))}
.mapa .nowrap.deleite .no:not(.futuro) img{-webkit-filter:hue-rotate(-45deg) drop-shadow(0 0 10px rgba(255,150,210,.8));filter:hue-rotate(-45deg) drop-shadow(0 0 10px rgba(255,150,210,.8))}
.mapa .rotulo{position:absolute;left:50%;top:100%;margin-top:2px;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  white-space:nowrap;font-size:12px;font-weight:800;color:#fff;background:rgba(10,14,40,.72);padding:3px 9px;border-radius:11px;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.mapa .walker{position:absolute;z-index:6;margin-left:50px;-webkit-transform:translate(-50%,-92%);transform:translate(-50%,-92%);
  -webkit-transition:left 1.4s ease-in-out,top 1.4s ease-in-out;transition:left 1.4s ease-in-out,top 1.4s ease-in-out}
.mapa .walker .fag{position:relative;width:72px}
/* ANDANDO na trilha: passinhos (pulinhos curtos) enquanto desliza até a parada */
.mapa .walker.anda .fagwrap{-webkit-animation:passinho .32s ease-in-out infinite;animation:passinho .32s ease-in-out infinite}
@-webkit-keyframes passinho{0%,100%{-webkit-transform:translateY(0) rotate(-2.5deg)}50%{-webkit-transform:translateY(-9px) rotate(2.5deg)}}
@keyframes passinho{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-9px) rotate(2.5deg)}}

/* ---------- PARADA (criar/resolver: grupos iguais) ---------- */
.fagfala{position:absolute;bottom:0;right:2px;width:100px;z-index:3;pointer-events:none}
.fagfala .fag{position:relative;width:100%;max-width:none}
.balao{position:absolute;top:26px;left:12px;right:12px;max-width:560px;margin:0 auto;
  background:rgba(24,28,58,.94);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:13px 16px;
  font-size:15.5px;line-height:1.4;color:#eef1ff;font-weight:600;z-index:4;text-align:center;
  box-shadow:0 10px 26px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.06)}
.balao b{color:#ffe08a}
.caixas{position:absolute;left:0;right:0;top:32%;text-align:center;z-index:2;padding:0 6px}
.caixa{display:inline-block;vertical-align:top;width:31%;max-width:132px;margin:0 1%;position:relative;cursor:pointer;padding-bottom:16px}
.caixa:active{-webkit-transform:scale(.96);transform:scale(.96)}
.caixa .cratimg{width:100%;height:auto;display:block;
  -webkit-filter:drop-shadow(0 5px 8px rgba(0,0,0,.45));filter:drop-shadow(0 5px 8px rgba(0,0,0,.45))}
.caixa .estrs{position:absolute;top:26%;left:15%;right:15%;height:30%;text-align:center;line-height:.85;z-index:2;overflow:hidden}
.caixa .estr{width:15px;height:auto;margin:1px;cursor:pointer;
  -webkit-filter:drop-shadow(0 0 4px rgba(255,220,120,.9));filter:drop-shadow(0 0 4px rgba(255,220,120,.9));
  -webkit-animation:estrPop .32s ease;animation:estrPop .32s ease}
@-webkit-keyframes estrPop{0%{-webkit-transform:scale(.3)}70%{-webkit-transform:scale(1.18)}100%{-webkit-transform:scale(1)}}
@keyframes estrPop{0%{transform:scale(.3)}70%{transform:scale(1.18)}100%{transform:scale(1)}}
.caixa .cnt{position:absolute;bottom:0;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  min-width:24px;background:#ffd75e;color:#5a3b00;font-weight:900;font-size:15px;border-radius:12px;padding:1px 9px;box-shadow:0 2px 0 #c8871a}
.p1barra{position:absolute;left:0;right:0;bottom:3%;text-align:center;z-index:7}   /* acima da revela: prêmio/botões nunca somem atrás do cartão */
/* DICA/EXPLICAÇÃO = bolha própria ACIMA dos botões (z-index alto): nunca fica escondida
   atrás do alto-falante/botão Dica. Some sozinha quando não há texto (:empty). */
.p1dica,.pdica{position:absolute;left:14px;right:14px;bottom:100%;margin-bottom:10px;z-index:11;
  font-size:14px;color:#ffe9a8;font-style:italic;line-height:1.35;text-align:center;
  background:rgba(15,20,48,.94);border:1px solid rgba(255,225,150,.45);border-radius:14px;padding:10px 13px;
  box-shadow:0 8px 22px rgba(0,0,0,.5);
  -webkit-animation:aeIn .3s ease both;animation:aeIn .3s ease both}
.p1dica:empty,.pdica:empty{display:none}
.btn2{border:0;cursor:pointer;font-family:inherit;font-weight:700;color:#20264a;background:#e7ebff;
  padding:9px 18px;font-size:15px;border-radius:20px;box-shadow:0 3px 0 #9aa3d6}
.btn2:active{-webkit-transform:translateY(2px);transform:translateY(2px);box-shadow:0 1px 0 #9aa3d6}
/* EXPLICAÇÃO = cartão de vidro EMBAIXO (nunca sobre a atividade).
   bottom:24% deixa faixa livre pros botões + linha "+N estrelas" (que ficavam ESCONDIDOS atrás). */
.revela{position:absolute;left:10px;right:10px;bottom:24%;z-index:6;text-align:center;padding:13px 16px 15px;
  background:rgba(16,22,54,.9);border:1px solid rgba(255,225,150,.42);border-radius:20px;
  box-shadow:0 14px 36px rgba(0,0,0,.55);
  -webkit-animation:sobeSheet .5s cubic-bezier(.2,.9,.25,1) both;animation:sobeSheet .5s cubic-bezier(.2,.9,.25,1) both}
@-webkit-keyframes sobeSheet{0%{opacity:0;-webkit-transform:translateY(34px)}100%{opacity:1;-webkit-transform:translateY(0)}}
@keyframes sobeSheet{0%{opacity:0;transform:translateY(34px)}100%{opacity:1;transform:translateY(0)}}
.revela .r1{font-size:19px;color:#fff;font-weight:800;margin-bottom:3px}
.revela .r2{font-size:31px;color:#ffe08a;font-weight:900;text-shadow:0 0 18px rgba(255,200,80,.7);margin-bottom:8px}
.revela .r3{font-size:14px;color:#e9ecff;line-height:1.35}
.burst{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;overflow:hidden}
.bstar{position:absolute;width:34px;opacity:1}
@-webkit-keyframes bfly{0%{opacity:1;-webkit-transform:translateY(0) scale(.4) rotate(0)}100%{opacity:0;-webkit-transform:translateY(-46px) scale(1.35) rotate(140deg)}}
@keyframes bfly{0%{opacity:1;transform:translateY(0) scale(.4) rotate(0)}100%{opacity:0;transform:translateY(-46px) scale(1.35) rotate(140deg)}}

/* ---------- PARADA 2 — A Constelação (array com steppers) ---------- */
.p2 .grade{position:absolute;left:0;right:0;top:25%;bottom:33%;z-index:2;text-align:center;
  display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column;
  -webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;-webkit-box-align:center;-webkit-align-items:center;align-items:center}

.gestr{width:30px;height:auto;margin:3px;-webkit-animation:estrPop .3s ease;animation:estrPop .3s ease}
.grade.acesa .gestr{-webkit-filter:drop-shadow(0 0 9px rgba(255,220,120,.95));filter:drop-shadow(0 0 9px rgba(255,220,120,.95))}
.steppers{position:absolute;left:0;right:0;bottom:15%;z-index:4;text-align:center}

.sbtn{border:0;cursor:pointer;font-family:inherit;font-weight:900;color:#5a3b00;width:42px;height:42px;font-size:23px;border-radius:12px;vertical-align:middle;

/* ---------- PARADA 3 — Dois jeitos (comutatividade) ---------- */
.p3 .p3wrap{position:absolute;left:0;right:0;top:24%;bottom:24%;z-index:2;text-align:center;
  -webkit-transform-origin:50% 28%;transform-origin:50% 28%;
  -webkit-transition:opacity .45s ease,-webkit-transform .45s ease;transition:opacity .45s ease,transform .45s ease}
.p3 .p3wrap.vira{opacity:.15;-webkit-transform:rotate(90deg) scale(.7);transform:rotate(90deg) scale(.7)}
/* VIRA-TAPETE: a criança gira com o PRÓPRIO dedo (o gesto é o argumento da comutatividade) */
.p3 .p3wrap.giravel{cursor:-webkit-grab;cursor:grab;
  -webkit-animation:conviteGira 2.4s ease-in-out infinite;animation:conviteGira 2.4s ease-in-out infinite}
.p3 .p3wrap.giravel.pegando{-webkit-animation:none;animation:none;-webkit-transition:none;transition:none;
  cursor:-webkit-grabbing;cursor:grabbing}
@-webkit-keyframes conviteGira{0%,100%{-webkit-transform:rotate(0)}30%{-webkit-transform:rotate(2.5deg)}60%{-webkit-transform:rotate(-2.5deg)}}

/* ---------- PARADA 4 — O Céu Grande (×10) ---------- */

/* ---------- ALÍVIO 2 — Monte a Constelação (memória) ---------- */
.memoria .memgrid{position:absolute;left:0;right:0;top:24%;bottom:22%;z-index:3;text-align:center;padding:0 8px;

.gradeMini .fila{white-space:nowrap;line-height:0;opacity:1}
.gradeMini .gestr{width:11px;max-width:11px;margin:1px;-webkit-filter:drop-shadow(0 0 4px rgba(255,220,120,.8));filter:drop-shadow(0 0 4px rgba(255,220,120,.8))}

/* ---------- PARADA 5 — A Sua Constelação (opções de total) ---------- */
.p5 .opts{position:absolute;left:0;right:0;bottom:11%;z-index:4;text-align:center}

.optbtn{border:0;cursor:pointer;font-family:inherit;font-weight:800;color:#2b2f5a;width:70px;height:60px;font-size:27px;border-radius:18px;margin:0 7px;

/* ===== MAPA CONSTELAÇÃO (moderno, identidade NOSSA: espaço + linhas de luz + vidro) ===== */

  -webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);
  -webkit-filter:drop-shadow(0 0 9px rgba(255,210,120,.9));filter:drop-shadow(0 0 9px rgba(255,210,120,.9));
  -webkit-animation:estrTwk 3.6s ease-in-out infinite;animation:estrTwk 3.6s ease-in-out infinite}

.mapa.constel .no.futuro .estrn{-webkit-filter:grayscale(1) brightness(.55);filter:grayscale(1) brightness(.55);opacity:.5}

.mapa.constel .nowrap.deleite .no:not(.futuro) .estrn{-webkit-filter:hue-rotate(-42deg) drop-shadow(0 0 12px rgba(255,150,215,.9));filter:hue-rotate(-42deg) drop-shadow(0 0 12px rgba(255,150,215,.9))}
.mapa.constel .atual-wrap .farol{position:absolute;left:50%;top:50%;width:150%;height:150%;border-radius:50%;z-index:-1;
  border:2px solid rgba(255,225,150,.6);-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);
  -webkit-animation:farolPulse 1.8s ease-out infinite;animation:farolPulse 1.8s ease-out infinite}
.mapa.constel .rotulo{position:absolute;left:50%;top:122%;-webkit-transform:translateX(-50%);transform:translateX(-50%);
  white-space:nowrap;font-size:13px;font-weight:900;letter-spacing:1px;color:#ffe6a3;
  background:rgba(20,26,60,.78);padding:8px 20px;border-radius:16px;border:1px solid rgba(255,225,150,.5);
  box-shadow:0 4px 14px rgba(0,0,0,.5);-webkit-animation:comBounce 1s ease-in-out infinite;animation:comBounce 1s ease-in-out infinite}

.hud.glass{background:rgba(18,24,58,.55);border:1px solid rgba(255,255,255,.14);
  box-shadow:0 6px 22px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);
  border-bottom-left-radius:22px;border-bottom-right-radius:22px;padding:9px 14px 11px;padding-top:calc(9px + env(safe-area-inset-top,0px))}

.hud.glass .hpar b{color:#ffe08a;font-size:16px}
.mapa.constel .unidade{position:absolute;top:60px;left:12px;right:12px;z-index:6;
  display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;
  background:rgba(24,30,66,.62);border:1px solid rgba(255,225,150,.4);color:#ffe6a3;padding:11px 16px;border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.4)}
.mapa.constel .utxt{text-align:left}
.mapa.constel .usec{font-size:11px;font-weight:800;letter-spacing:1px;color:#c9b98a}
.mapa.constel .utit{font-size:17px;font-weight:900;line-height:1.1;margin-top:2px;color:#ffe6a3}
.mapa.constel .ubook{position:relative;width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,225,150,.3);-webkit-box-flex:0;-webkit-flex:none;flex:none}

/* (mapa-claro removido: era o modelo antigo, não usado — só a constelação roda) */
.hico.coroa{width:20px;height:15px;background:#ffc23c;
  -webkit-clip-path:polygon(0 100%,0 34%,25% 60%,50% 0,75% 60%,100% 34%,100% 100%);clip-path:polygon(0 100%,0 34%,25% 60%,50% 0,75% 60%,100% 34%,100% 100%)}

/* pulo da Nara ao comemorar — 12 princípios: ANTECIPAÇÃO (agacha) -> STRETCH no ar ->
   SQUASH na aterrissagem -> assenta (volume constante: X cresce quando Y encolhe) */
.fag.pulo{-webkit-animation:puloFag .7s cubic-bezier(.34,1.56,.64,1);animation:puloFag .7s cubic-bezier(.34,1.56,.64,1)}
@-webkit-keyframes puloFag{0%{-webkit-transform:translateY(0) scale(1,1)}18%{-webkit-transform:translateY(3px) scale(1.07,.9)}48%{-webkit-transform:translateY(-20px) scale(.94,1.08)}72%{-webkit-transform:translateY(2px) scale(1.06,.93)}100%{-webkit-transform:translateY(0) scale(1,1)}}
@keyframes puloFag{0%{transform:translateY(0) scale(1,1)}18%{transform:translateY(3px) scale(1.07,.9)}48%{transform:translateY(-20px) scale(.94,1.08)}72%{transform:translateY(2px) scale(1.06,.93)}100%{transform:translateY(0) scale(1,1)}}
/* rastro de faíscas quando a Nara anda no mapa */
.fagrastro{position:absolute;width:12px;height:auto;z-index:5;pointer-events:none;
  -webkit-filter:drop-shadow(0 0 5px rgba(255,225,140,.9));filter:drop-shadow(0 0 5px rgba(255,225,140,.9));
  -webkit-animation:rastroSome .7s ease-out both;animation:rastroSome .7s ease-out both}
@-webkit-keyframes rastroSome{from{opacity:.95;-webkit-transform:scale(1)}to{opacity:0;-webkit-transform:translateY(10px) scale(.3)}}
@keyframes rastroSome{from{opacity:.95;transform:scale(1)}to{opacity:0;transform:translateY(10px) scale(.3)}}

/* barra de progresso no topo das paradas (ritmo de lição) */
.barratopo{position:absolute;top:7px;left:10px;right:10px;height:12px;border-radius:8px;z-index:8;overflow:hidden;
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22)}
.barratopo i{display:block;height:100%;border-radius:8px;
  background:-webkit-linear-gradient(left,#ffe27a,#ffb020);background:linear-gradient(to right,#ffe27a,#ffb020)}

/* botão "Ouvir de novo" — alto-falante que repete o enunciado (essencial p/ quem não lê) */
#ouvirbtn{position:absolute;left:10px;bottom:3%;z-index:9;width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;padding:0;
  background:rgba(20,26,60,.88);border:1px solid rgba(255,225,150,.55);box-shadow:0 4px 14px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1)}
#ouvirbtn .spk{position:absolute;left:50%;top:50%;width:20px;height:18px;margin:-9px 0 0 -11px;background:#ffe6a3;
  -webkit-clip-path:polygon(0 32%,42% 32%,100% 0,100% 100%,42% 68%,0 68%);clip-path:polygon(0 32%,42% 32%,100% 0,100% 100%,42% 68%,0 68%)}
#ouvirbtn .spk:after{content:"";position:absolute;left:118%;top:50%;width:7px;height:7px;margin-top:-3.5px;border:2px solid #ffe6a3;border-left:0;border-top:0;border-radius:0 8px 8px 0;opacity:.9}
#ouvirbtn.tocando{-webkit-animation:pulsa 1s ease-in-out infinite;animation:pulsa 1s ease-in-out infinite}
#ouvirbtn:active{-webkit-transform:scale(.94);transform:scale(.94)}

/* botão DICA (ajuda graduada, sob demanda) — canto inferior esquerdo, ao lado do alto-falante */
.ajudabtn{position:absolute;left:64px;bottom:3%;z-index:9;border:0;cursor:pointer;font-family:inherit;font-weight:800;font-size:13px;color:#5a3b00;
  background:-webkit-linear-gradient(top,#ffe27a,#ffc23c);background:linear-gradient(to bottom,#ffe27a,#ffc23c);

.ajudabtn .lamp{position:absolute;left:12px;top:50%;width:11px;height:11px;margin-top:-8px;border-radius:50% 50% 45% 45%;background:#fff7d4;box-shadow:0 0 6px 1px rgba(255,240,180,.95)}
.ajudabtn .lamp:after{content:"";position:absolute;left:3px;top:11px;width:5px;height:3px;background:#7a5200;border-radius:0 0 2px 2px}

.ajudabtn:active{-webkit-transform:translateY(1px);transform:translateY(1px)}

/* card de AUTOEXPLICAÇÃO (a Nara pergunta "por quê?") — CONVERSA, não questionário:
   a Nara aparece pensando no card e a criança TOCA NO DESENHO que mostra o porquê. */
.autoexp{position:absolute;left:12px;right:12px;top:20%;z-index:8;background:rgba(15,20,48,.97);border:1px solid rgba(255,225,150,.45);

/* IDEIA CERTA acende em DOURADO (feedback de tarefa, alegre — nunca vermelho/"errado") */

/* "reduzir movimento" desliga só os movimentos GRANDES (parallax/câmera/entradas);
   a vida gentil (respirar, piscar, brilho, estrelas) fica sempre ligada. */
/* ===== VIDA VISUAL (moderno é vivo): aurora, biomas com micro-vida ===== */
.aurora{position:absolute;border-radius:50%;filter:blur(46px);-webkit-filter:blur(46px);opacity:.28;pointer-events:none}
.aurora.a1{left:-20%;top:-10%;width:80%;height:60%;background:radial-gradient(circle,#2ea6ff,rgba(46,166,255,0) 70%);
  -webkit-animation:auroraA 26s ease-in-out infinite alternate;animation:auroraA 26s ease-in-out infinite alternate}
.aurora.a2{right:-25%;bottom:-15%;width:90%;height:65%;background:radial-gradient(circle,#38d9b0,rgba(56,217,176,0) 70%);
  -webkit-animation:auroraB 32s ease-in-out infinite alternate;animation:auroraB 32s ease-in-out infinite alternate}
@-webkit-keyframes auroraA{from{-webkit-transform:translate3d(0,0,0) scale(1)}to{-webkit-transform:translate3d(14%,10%,0) scale(1.25)}}
@keyframes auroraA{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(14%,10%,0) scale(1.25)}}
@-webkit-keyframes auroraB{from{-webkit-transform:translate3d(0,0,0) scale(1.1)}to{-webkit-transform:translate3d(-12%,-8%,0) scale(.9)}}
@keyframes auroraB{from{transform:translate3d(0,0,0) scale(1.1)}to{transform:translate3d(-12%,-8%,0) scale(.9)}}
/* biomas VIVOS: respiram + brilho deslizante + camada de partículas */
.biotile{-webkit-animation:estrPop .35s ease, bioResp 6s ease-in-out infinite;animation:estrPop .35s ease, bioResp 6s ease-in-out infinite}
@-webkit-keyframes bioResp{0%,100%{-webkit-transform:scale(1)}50%{-webkit-transform:scale(1.012)}}
@keyframes bioResp{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
.biotile .shine{position:absolute;top:0;left:-60%;width:40%;height:100%;z-index:2;pointer-events:none;
  background:-webkit-linear-gradient(left,rgba(255,255,255,0),rgba(255,255,255,.22),rgba(255,255,255,0));

/* ---- PALCO: escala o canvas fixo (400x780) pra caber em QUALQUER tela ---- */
var BASE_W=400, BASE_H=780, palcoFull=false;
function ajustaPalco(){
  var pal=document.getElementById("stage"); if(!pal||palcoFull)return;
  var s=Math.min(window.innerWidth/BASE_W, window.innerHeight/BASE_H);
  pal.style.webkitTransform="translate(-50%,-50%) scale("+s+")";
  pal.style.transform="translate(-50%,-50%) scale("+s+")";
}
/* MAPA usa a tela INTEIRA (trilha que rola); paradas ficam no palco fixo (encaixe garantido) */
function stageFull(on){
  var st=document.getElementById("stage"); if(!st)return; palcoFull=!!on;
  if(on){ st.style.top="0"; st.style.left="0"; st.style.width="100%"; st.style.height="100%"; st.style.webkitTransform="none"; st.style.transform="none"; }
  else { st.style.top="50%"; st.style.left="50%"; st.style.width=BASE_W+"px"; st.style.height=BASE_H+"px"; ajustaPalco(); }

/* ---- SESSÃO (estilo Duolingo: estrelas ganhas + ofensiva/sequência) ---- */
var sessao={estrelas:0, ultimo:0, ofensiva:1};
function premiar(n){ sessao.ultimo=n; sessao.estrelas+=n; }

  try{
    var h=new Date(), ds=h.getFullYear()+"-"+(h.getMonth()+1)+"-"+h.getDate();
    var o=JSON.parse(localStorage.getItem("estrelas_ofensiva")||"null");
    if(!o){ o={dias:1,ultimo:ds}; }
    else if(o.ultimo!==ds){
      var y=new Date(h.getTime()-86400000), ys=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
      o.dias=(o.ultimo===ys)?o.dias+1:1; o.ultimo=ds;
    }
    localStorage.setItem("estrelas_ofensiva",JSON.stringify(o));
    sessao.ofensiva=o.dias;
  }catch(e){ sessao.ofensiva=1; }
}
atualizaOfensiva();

(function(){ var st=document.getElementById("stage"); if(st) st.appendChild(ouvirBtn); })();

/* conta JUNTO com a criança as estrelas que entram na caixa (Parada 1) */
function contaEstrela(k){
  var nomes=["uma","duas","tres","quatro","cinco"]; if(k<1||k>nomes.length)return;
  var cheia=(typeof P1!=="undefined" && P1 && k===P1.m);   // a última da caixa comemora: "Caixa cheia!"
  falar("conta_"+nomes[k-1]+(cheia?"_cheia":""));

var falandoCb=null, bocaAlvo=0, bocaSuave=0, falaTimer=0, falaAtual="";
function falar(id, cb){
  falandoCb=cb||null;
  // se ela acabou de comemorar/apontar, VOLTA à pose neutra antes de narrar — a narração
  // nunca começa com o braço levantado (bug que o Marcos viu: fala com a mão no ar).
  if(fagAtual&&fagAtual.base&&/nara_(comemora|aponta|acena)\.png/.test(fagAtual.base.src||"")){ fagPose("nara"); }

  if(id && id.indexOf("conta_")!==0){ falaAtual=id; mostraOuvir(true); }   // guarda p/ "Ouvir de novo" (contagem não vira alvo)
  ouvirBtn.className="tocando";

  narr.src="audio/"+id+".mp3";
  var p=narr.play();
  if(p && p["catch"]){ p["catch"](function(){ /* sem áudio: segue mesmo assim */ }); }

  if(falaTimer) clearInterval(falaTimer);
  bocaAlvo=0.7;
  falaTimer=setInterval(function(){
    if(narr.paused||narr.ended){ bocaAlvo=0; }
    else if(!anaOk){ bocaAlvo = 0.25 + Math.random()*0.75; }   // sem analisador: modo sorteado; com ele, o loop() segue a voz
  }, 95);

function paraBoca(){ if(falaTimer){clearInterval(falaTimer);falaTimer=0;} bocaAlvo=0; }
/* toca uma fala e SÓ ENTÃO segue (no fim do áudio) — com rede de segurança.

   está tocando (a tela seguinte chegava antes da voz acabar). Regra: o prazo só
   dispara se o áudio NÃO estiver tocando (faltou/travou); tocando = espera o fim. */

  var feito=false; function go(){ if(feito)return; feito=true; cb(); }

    if(audioCtx.state==="suspended"){ audioCtx.resume(); }
    var o=audioCtx.createOscillator(), g=audioCtx.createGain(), t0=audioCtx.currentTime;
    o.type="triangle"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.linearRampToValueAtTime(0.28,t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0008,t0+0.55);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0+0.6);
  }catch(e){}
}
/* ---- sons DIEGÉTICOS (o mundo reage: a estrela canta ao acender) ---- */
function somTom(freq,dur,vol,tipo,dl){
  try{
    if(!audioCtx){ var AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; audioCtx=new AC(); }
    if(audioCtx.state==="suspended"){ audioCtx.resume(); }
    var o=audioCtx.createOscillator(), g=audioCtx.createGain(), t0=audioCtx.currentTime+(dl||0);
    o.type=tipo||"triangle"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.linearRampToValueAtTime(vol||0.22,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0006,t0+(dur||0.4));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0+(dur||0.4)+0.02);
  }catch(e){}
}

/* LIP-SYNC DE VERDADE: um analisador lê a amplitude da narração (MP3 da mesma origem)
   e a boca/gesto seguem a VOZ, sílaba a sílaba. Liga no 1º gesto (regra de autoplay).
   Se o navegador não deixar, cai no modo antigo (boca animada por sorteio) sem quebrar. */
var anaNode=null, anaBuf=null, anaOk=false, anaTent=false;
function ligaAnalisador(){
  if(anaOk||anaTent)return; anaTent=true;
  try{
    var AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
    if(!audioCtx) audioCtx=new AC();
    if(audioCtx.state==="suspended"){ audioCtx.resume(); }
    var src=audioCtx.createMediaElementSource(narr);
    anaNode=audioCtx.createAnalyser(); anaNode.fftSize=512;
    src.connect(anaNode); anaNode.connect(audioCtx.destination);
    anaBuf=new Uint8Array(anaNode.fftSize);
    anaOk=true;
  }catch(e){ anaNode=null; }
}
/* toque suave em botões e nós do mapa (também destrava o áudio no 1º gesto) */
function _clsStr(n){ return (n && typeof n.className==="string") ? n.className : ""; }
document.addEventListener("pointerdown",function(ev){
  ligaAnalisador();
  var n=ev.target, hop=0;
  while(n && n.nodeType===1 && hop<4){
    var c=_clsStr(n);
    if(n.tagName==="BUTTON" || /(^|\s)pcor(\s|$)/.test(c) || (/(^|\s)no(\s|$)/.test(c)&&/(^|\s)atual(\s|$)/.test(c))){ somClick(); return; }
    n=n.parentNode; hop++;
  }
},true);
function loop(){
  /* boca guiada pela VOZ (RMS do analisador); sem analisador, vale o sorteio do iniciaBoca */
  if(anaOk && !narr.paused && !narr.ended){
    try{
      anaNode.getByteTimeDomainData(anaBuf);
      var iA,sA=0,vA; for(iA=0;iA<anaBuf.length;iA+=4){ vA=(anaBuf[iA]-128)/128; sA+=vA*vA; }
      var rms=Math.sqrt(sA/(anaBuf.length/4));
      bocaAlvo=(rms<0.012)?0:Math.min(1,0.18+rms*6);
    }catch(eA){}
  }
  if(fagAtual && fagAtual.fala){
    bocaSuave += (bocaAlvo-bocaSuave)*0.45;   // suaviza só p/ o gesto do corpo
    /* LIP-FLAP NÍTIDO (2D de verdade): a boca fica ABERTA ou FECHADA, nunca num
       "fantasma" translúcido no meio. Histerese (abre>0.30, fecha<0.14) = não tremula. */
    var aberta = (fagAtual._boca===1) ? (bocaAlvo>0.14) : (bocaAlvo>0.30);
    fagAtual._boca = aberta?1:0;
    fagAtual.fala.style.opacity = aberta ? "1" : "0";
    if(fagAtual.corpo && !reduz){
      if(bocaSuave>0.04){
        var tt=(new Date()).getTime();
        // baloiço macio + leve elevação no ritmo da fala (viva, sem tremer)
        var tr="translateY("+(-2.6*bocaSuave).toFixed(2)+"px) rotate("+(Math.sin(tt/520)*1.5*bocaSuave).toFixed(2)+"deg)";
        fagAtual.corpo.style.webkitTransform=tr; fagAtual.corpo.style.transform=tr;
      } else if(fagAtual.corpo.style.transform){
        fagAtual.corpo.style.webkitTransform=""; fagAtual.corpo.style.transform="";
      }
    }
  }
  requestAnimationFrame(loop);
}

   Virada de ano = trocar esta lista (alunos novos entram, turmas se atualizam).
   Ex.: {"3º ano A":["Sofia","Davi Lucas"], "3º ano B":["Helena"]} */
var LISTA_ALUNOS={};
function semeiaLista(){
  try{
    var t,i,a=alunosLe(),mapa={},mudou=false;
    for(i=0;i<a.length;i++){ mapa[a[i].turma+"|"+normNome(a[i].nome)]=1; }
    for(t in LISTA_ALUNOS){
      var arr=LISTA_ALUNOS[t]||[];
      for(i=0;i<arr.length;i++){
        var ch=t+"|"+normNome(arr[i]);
        if(!mapa[ch]){ mapa[ch]=1; mudou=true;
          a.push({id:"a"+(new Date()).getTime().toString(36)+Math.floor(Math.random()*1e6).toString(36),
                  nome:bonito(arr[i]),turma:t,criado:diaStr(hojeMs()),oficial:true}); }
      }
    }
    if(mudou) alunosGrava(a);
  }catch(e){}
}
function alunosLe(){ try{ return JSON.parse(localStorage.getItem("edu_alunos")||"[]"); }catch(e){ return []; } }
function alunosGrava(a){ try{ localStorage.setItem("edu_alunos",JSON.stringify(a)); }catch(e){} }
function alunoAtual(){ try{ var id=localStorage.getItem("edu_atual"); if(!id)return null; var a=alunosLe(),i; for(i=0;i<a.length;i++){ if(a[i].id===id)return a[i]; } }catch(e){} return null; }
function kAluno(base){ var a=alunoAtual(); var id=painelSel||(a?a.id:"anon"); return base+"_"+id; }
function normNome(s){
  s=(""+s).replace(/^\s+|\s+$/g,"").replace(/\s+/g," ").toLowerCase();
  try{ s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }catch(e){}
  return s;
}
function bonito(s){ s=(""+s).replace(/^\s+|\s+$/g,"").replace(/\s+/g," "); return s? s.charAt(0).toUpperCase()+s.slice(1) : s; }
function levenshtein(a,b){
  var m=a.length,n=b.length,i,j,prev,tmp;
  if(!m)return n; if(!n)return m;
  var v=[]; for(j=0;j<=n;j++)v[j]=j;
  for(i=1;i<=m;i++){ prev=v[0]; v[0]=i;
    for(j=1;j<=n;j++){ tmp=v[j];
      v[j]=Math.min(v[j]+1, v[j-1]+1, prev+(a.charAt(i-1)===b.charAt(j-1)?0:1));
      prev=tmp; } }
  return v[n];
}
function parecidos(nome,turma){
  var alvo=normNome(nome), out=[], a=alunosLe(), i;
  for(i=0;i<a.length;i++){
    if(a[i].turma!==turma) continue;
    var n=normNome(a[i].nome);
    if(n===alvo){ out.unshift(a[i]); continue; }
    if(Math.max(n.length,alvo.length)>=4 && levenshtein(n,alvo)<=2) out.push(a[i]);
  }
  return out;
}

/* ================= MOTOR DE DOMÍNIO (BKT-lite por conceito + revisão espaçada Leitner) =================
   - Cada conceito (KC) tem um domínio estimado p (0..1), atualizado a cada vitória
     conforme a FORÇA da evidência (de primeira e sem dica = forte).
   - Cada KC tem uma caixa Leitner: revisar em 1/3/7/14 dias. Acertou na revisão -> sobe
     de caixa; errou -> volta pra caixa 1 (revisa amanhã). É o motivo de volta PEDAGÓGICO.
   - Tudo invisível pra criança (Lei #1: medir sem rótulo); o professor vê no ?painel. */
var KCS={p1:"Grupos iguais",p2:"Constelação (fileiras × colunas)",p3:"Dois jeitos (3×4 = 4×3)",
  soma:"Soma que vira vezes",p4:"O atalho do ×10",prob:"Problema em contexto",
  p5:"Criar a própria constelação",desafio:"De cabeça (sem apoios)"};
var LEITNER=[1,3,7,14];                      // dias até a próxima revisão, por caixa
var PRATICA=false, mgKc="", mgP=0, dicasParada=0;
function hojeMs(){ return (new Date()).getTime(); }
function diaStr(t){ var d=new Date(t); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function motorLe(){ try{ return JSON.parse(localStorage.getItem(kAluno("estrelas_motor"))||"{}"); }catch(e){ return {}; } }
function motorGrava(m){ try{ localStorage.setItem(kAluno("estrelas_motor"),JSON.stringify(m)); }catch(e){} }
function motorKc(m,kc){ if(!m[kc]) m[kc]={p:0.25,box:0,next:0,varIdx:0,hist:[]}; return m[kc]; }
/* vitória numa parada: atualiza o domínio (forca 3=de primeira/sem dica, 2=média, 1=com muita ajuda) */
function motorParada(kc,forca){
  var m=motorLe(), e=motorKc(m,kc);
  var ganho=(forca>=3?0.45:(forca===2?0.3:0.15));
  e.p=e.p+(1-e.p)*ganho;
  if(forca<=1) e.p=Math.min(e.p,0.55);       // com muita ajuda ainda não é domínio
  if(!e.box){ e.box=1; e.next=hojeMs()+LEITNER[0]*86400000; }   // 1ª vitória agenda revisão amanhã
  e.hist.push({t:hojeMs(),tipo:"parada",forca:forca});
  if(e.hist.length>40)e.hist=e.hist.slice(e.hist.length-40);
  motorGrava(m); mgKc=kc; mgP=e.p; return e.p;
}
/* item de revisão espaçada (Aquecimento): reagenda a caixa e mede RETENÇÃO */
function motorRevisao(kc,acertou){
  var m=motorLe(), e=motorKc(m,kc);
  if(acertou){ e.p=e.p+(1-e.p)*0.25; e.box=Math.min(e.box+1,LEITNER.length); }
  else { e.p=e.p*0.7; e.box=1; }
  e.next=hojeMs()+LEITNER[e.box-1]*86400000;
  e.hist.push({t:hojeMs(),tipo:"revisao",ok:!!acertou});
  if(e.hist.length>40)e.hist=e.hist.slice(e.hist.length-40);
  motorGrava(m);
}
function kcsVencidos(){ var m=motorLe(),out=[],k; for(k in m){ if(m[k]&&m[k].box>0 && m[k].next<=hojeMs()) out.push(k); } return out; }
/* retenção medida (separada das evidências da sessão: sobrevive ao "Jogar de novo") */
function salvaRet(r){ try{ var f=JSON.parse(localStorage.getItem(kAluno("estrelas_retencao"))||"[]"); f.push(r); if(f.length>100)f=f.slice(f.length-100); localStorage.setItem(kAluno("estrelas_retencao"),JSON.stringify(f)); }catch(e){} }

/* força da evidência da parada que acabou (usa erros + dicas pedidas) */
function forcaDe(semErro){ return (semErro&&dicasParada===0)?3:((dicasParada>=3)?1:2); }
function embaralha(a){ var i,j,t; for(i=a.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); t=a[i];a[i]=a[j];a[j]=t; } return a; }
function repete(v,n){ var a=[],i; for(i=0;i<n;i++)a.push(v); return a; }

/* ============ AQUECIMENTO — revisão espaçada (Leitner) na VOLTA ============
   Se a criança volta noutro dia com conceitos "vencidos", a Nara convida a
   REACENDER as estrelas: 3 itens rápidos de recuperação (retrieval). Errou?
   O mundo MOSTRA os grupos e conta junto — e a criança tenta de novo, sem punição.
   Cada item mede RETENÇÃO de verdade (dias depois) e reagenda a caixa Leitner. */
function aquecimentoDevido(){
  var due=kcsVencidos(); if(!due.length) return null;
  var ult=""; try{ ult=localStorage.getItem(kAluno("estrelas_aq_dia"))||""; }catch(e){}
  if(ult===diaStr(hojeMs())) return null;   // no máximo 1 aquecimento por dia
  return due;
}
var AQ;

  for(i=0;i<3;i++){
    var kc=due[i%due.length], ab=base[kc]||[3,4];
    var a=ab[0]+((i>=due.length)?(i%2?1:-1):0); if(a<2)a=2; if(a>6&&ab[1]!==10)a=6;
    itens.push({kc:kc,a:a,b:ab[1],ok:true});

  AQ={i:0,itens:itens,trava:false};
  var t=el("div","tela parada perg aquece");

function aqRender(){
  var it=AQ.itens[AQ.i]; AQ.trava=false;

  if(bal)bal.innerHTML="<b>Reacenda as estrelas!</b> Faísca <b>"+(AQ.i+1)+" de 3</b>: quanto dá?";

  var gr=document.getElementById("aqgrade"); if(gr)gr.innerHTML="";
  var tot=it.a*it.b;
  var vals=[tot,it.a+it.b,tot+it.b,(it.b===10?tot+10:it.b*it.b)],vistos={},op=[],z;
  for(z=0;z<vals.length;z++){ var vv=vals[z]; while(vv<=0||vistos[vv])vv++; vistos[vv]=1; op.push({v:vv,certo:(z===0)}); }
  embaralha(op);
  var opts=document.getElementById("aqopts"); if(!opts)return; opts.innerHTML="";
  var row=el("div","optrow");
  for(z=0;z<op.length;z++){ (function(o){
    var b=el("button","optbtn",""+o.v);
    b.onclick=function(){
      if(AQ.trava)return;
      if(o.certo){ AQ.trava=true; somAcerto(); aqAcertou(); }
      else {

function lerEvid(){ try{ return JSON.parse(localStorage.getItem(kAluno("estrelas_evid"))||"[]"); }catch(e){ return []; } }
function pontuacao(){
  var ev=lerEvid(), map={}, i;
  for(i=0;i<ev.length;i++){ if(ev[i].parada) map[ev[i].parada]=ev[i]; }
  var aprend=["p1","p2","p3","p4","p5","desafio"], soma=0, cont=0, fluente=0, k;
  for(k=0;k<aprend.length;k++){ var e=map[aprend[k]]; if(!e)continue; cont++;
    if(e.total){ soma += (e.acertos||0)/e.total; if(e.semErro)fluente++; }
    else if(e.semErro){ soma+=1; fluente++; }
    else if(e.acertou){ soma+=0.7; }
  }
  var pct = cont? Math.round(soma/cont*100) : 0;
  var nivel = pct>=85?"Avançado":(pct>=60?"Adequado":"Em desenvolvimento");
  return {map:map,pct:pct,cont:cont,total:aprend.length,fluente:fluente,nivel:nivel};
}
/* PARECER DESCRITIVO -> registro do PROFESSOR (banco/local); NUNCA some na tela do aluno. */
function salvaParecerProf(d){
  var m=d.map, ind=[];
  if(m.p1) ind.push("latitude → temperatura (zonas do planeta)");
  if(m.p2) ind.push("distingue tempo × clima");
  if(m.p3) ind.push("relaciona clima → bioma (a LEI)");
  if(m.p4) ind.push("fatores: altitude/maritimidade quebram a latitude");
  if(m.p5) ind.push("autoria: criou uma região e leu o bioma"+(m.p5&&m.p5.corrigiu?" (corrigiu a mascote)":""));
  if(m.desafio) ind.push("transferência sem apoios "+(m.desafio.acertos||0)+"/"+(m.desafio.total||3));
  /* motor: domínio médio por conceito + retenção medida em dias seguintes */
  var mm=motorLe(), somaP=0, nKc=0, kk;
  for(kk in mm){ if(mm[kk]&&typeof mm[kk].p==="number"){ somaP+=mm[kk].p; nKc++; } }
  var dominio=nKc?Math.round(somaP/nKc*100):0;
  var ret=lerRet(), rok=0, rz;
  for(rz=0;rz<ret.length;rz++){ if(ret[rz].ok)rok++; }
  var txtRet=ret.length? (" Retenção em revisões espaçadas (dias depois): "+rok+" de "+ret.length+" itens reacendidos de primeira.") : " Retenção espaçada: ainda sem revisões (agendadas pelo motor para os próximos dias).";
  var parecer={ atividade:"Planeta Vivo", habilidade:"EF03MA07",
    porcentagem:d.pct, nivel:d.nivel, paradas_feitas:d.cont, total_paradas:d.total, fluencia:d.fluente,
    dominio_medio:dominio, retencao:[rok,ret.length],
    indicadores:ind,
    texto:"O estudante compreende a multiplicação como grupos iguais e disposição retangular (array). Indicadores observados: "+ind.join("; ")+". Acerto na atividade: "+d.pct+"%. Domínio médio estimado pelo motor: "+dominio+"%."+txtRet+" Nível sugerido: "+d.nivel+".",
    quando:(new Date()).toISOString() };
  /* identidade + registro COMPARTILHADO (edu_pareceres): é daqui que sai a avaliação
     consolidada de TODAS as atividades do estudante (padrão p/ as próximas atividades) */
  var alu=alunoAtual();
  parecer.aluno=alu?alu.nome:"(sem registro)"; parecer.turma=alu?alu.turma:""; parecer.alunoId=alu?alu.id:"anon"; parecer.slug=ATIVIDADE_ID;
  parecer.texto="Estudante: "+parecer.aluno+(parecer.turma?" ("+parecer.turma+")":"")+". "+parecer.texto;
  try{ var g=JSON.parse(localStorage.getItem("edu_pareceres")||"[]"); g.push(parecer); if(g.length>200)g=g.slice(g.length-200); localStorage.setItem("edu_pareceres",JSON.stringify(g)); }catch(e){}
  try{ var f=JSON.parse(localStorage.getItem(kAluno("estrelas_parecer_prof"))||"[]"); f.push(parecer); if(f.length>50)f=f.slice(f.length-50); localStorage.setItem(kAluno("estrelas_parecer_prof"),JSON.stringify(f)); }catch(e){}
  return parecer;
}

/* ============ PAINEL DO PROFESSOR (?painel) — leitura local, invisível pra criança ============ */
function pareceresDe(alunoId){
  var g=[],out=[],i; try{ g=JSON.parse(localStorage.getItem("edu_pareceres")||"[]"); }catch(e){}
  for(i=0;i<g.length;i++){ if(g[i].alunoId===alunoId) out.push(g[i]); }
  return out;
}
/* AVALIAÇÃO CONSOLIDADA: junta o parecer mais recente de CADA atividade do estudante,
   gera texto descritivo único + nota sugerida (tabela fixa; o professor ajusta). */
function consolidada(alunoId){
  var meus=pareceresDe(alunoId); if(!meus.length) return null;
  var por={},i; for(i=0;i<meus.length;i++){ por[meus[i].slug||meus[i].atividade]=meus[i]; }
  var lista=[],somaP=0,somaD=0,n=0,rok=0,rtot=0,inds={},k,j;
  for(k in por){ var p=por[k];
    lista.push(p.atividade+" — "+p.porcentagem+"% ("+(""+p.quando).substring(0,10)+")");
    somaP+=p.porcentagem; somaD+=(p.dominio_medio!=null?p.dominio_medio:p.porcentagem); n++;
    if(p.retencao){ rok+=p.retencao[0]; rtot+=p.retencao[1]; }
    for(j=0;j<(p.indicadores||[]).length;j++){ inds[p.indicadores[j]]=1; }
  }
  var pct=Math.round(somaP/n), dom=Math.round(somaD/n);
  var nivel=pct>=85?"Avançado":(pct>=60?"Adequado":"Em desenvolvimento");
  var nota=pct>=85?"9,0 a 10":(pct>=60?"7,0 a 8,4":"5,0 a 6,9");
  var indArr=[],ki; for(ki in inds)indArr.push(ki);
  var a=null,al=alunosLe(); for(i=0;i<al.length;i++){ if(al[i].id===alunoId)a=al[i]; }
  var txt="<b>AVALIAÇÃO DESCRITIVA CONSOLIDADA</b><br>"+
    "Estudante: <b>"+(a?a.nome:"(sem registro)")+"</b>"+(a?" — Turma "+a.turma:"")+" — "+diaStr(hojeMs())+"<br><br>"+
    "Atividades realizadas ("+n+"): "+lista.join("; ")+".<br><br>"+
    "O estudante demonstra, pelas evidências registradas nas atividades, compreensão dos conceitos trabalhados. "+
    "Acerto médio nas atividades: <b>"+pct+"%</b>. Domínio médio estimado pelos motores adaptativos: <b>"+dom+"%</b>. "+
    (rtot? "Retenção em revisões espaçadas: <b>"+rok+" de "+rtot+"</b> itens lembrados em dias seguintes. ":"")+
    "<br><br>Indicadores observados: "+indArr.join("; ")+".<br><br>"+
    "Nível geral: <b>"+nivel+"</b>. Nota sugerida (tabela fixa — o professor ajusta): <b>"+nota+"</b>.";
  return {html:txt,pct:pct,nivel:nivel,nota:nota,n:n};
}
/* EXCLUIR estudante (p/ testes do professor/da esposa): apaga registro, avaliações
   compartilhadas e TODO o caminho daquele aluno neste aparelho (motor/evidências/retenção) */
function excluiAluno(id){
  var a=alunosLe(),resto=[],i;
  for(i=0;i<a.length;i++){ if(a[i].id!==id) resto.push(a[i]); }
  alunosGrava(resto);
  try{
    var g=JSON.parse(localStorage.getItem("edu_pareceres")||"[]"),g2=[];
    for(i=0;i<g.length;i++){ if(g[i].alunoId!==id) g2.push(g[i]); }
    localStorage.setItem("edu_pareceres",JSON.stringify(g2));
    var bases=["estrelas_motor","estrelas_evid","estrelas_retencao","estrelas_aq_dia","estrelas_parecer_prof"];
    for(i=0;i<bases.length;i++){ localStorage.removeItem(bases[i]+"_"+id); }
    if(localStorage.getItem("edu_atual")===id) localStorage.removeItem("edu_atual");
  }catch(e){}
  painelSel=""; telaPainel();
}
/* SENHA DO PROFESSOR: o painel é SÓ do Marcos — o estudante não entra.
   1º acesso cria a senha (4 números, digitada 2x); depois pede sempre. Vale por sessão. */

  inp.setAttribute("inputmode","numeric"); inp.setAttribute("autocomplete","off");

      h2+="<div style='margin-top:4px'>"+r.quando+" &#183; "+(KCS[r.kc]||r.kc)+" &#183; "+r.conta+" — "+(r.ok?"reacendeu de primeira":"precisou contar de novo")+"</div>"; } }
  else h2+="<span class='pobs'>Nenhuma revisão feita ainda. O motor agenda 1/3/7/14 dias após cada conquista.</span>";

  else h3+="<span class='pobs'>Nenhum parecer deste estudante ainda (fecha um ao terminar a aventura).</span>";
  c3.innerHTML=h3; t.appendChild(c3);
